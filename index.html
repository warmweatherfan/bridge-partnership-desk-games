          h+='<div style="font-size:12px;color:#3a3a3a;padding:4px 0">'+(idx+1)+'. '+w.player1name+' / '+w.player2name+'</div>';
        });
      }
      h+='</div>';
    });
    h+='</div>';

    // Looking for a Partner section
    h+='<div style="margin-top:20px">';
    h+='<div style="font-size:14px;font-weight:700;color:#2a2a2a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #d0c0a0">&#128269; Looking for a Partner</div>';

    results.forEach(function(r){
      // Show LFP for all sessions regardless of table limit
      var regPairs=r.pairs?Object.values(r.pairs):[];
      var registeredUids={};
      regPairs.forEach(function(pair){
        registeredUids[pair.player1uid]=true;
        registeredUids[pair.player2uid]=true;
      });

      // Find players who have this club and date/session in their profile but are not registered
      var seekers=players.filter(function(p){
        if(registeredUids[p.uid])return false; // already registered
        if(!p.venues||!p.venues[club])return false; // no venue
        var vdata=p.venues[club];
        // Check if they have this date selected
        var hasDates=false;
        if(typeof vdata==='object'&&!Array.isArray(vdata)){
          if(vdata[r.date]){
            // Check if they have this session
            var sessArr=vdata[r.date];
            if(Array.isArray(sessArr)){
              hasDates=sessArr.some(function(s){return safeKey(s)===r.sKey;});
            }
          }
        }
        return hasDates;
      });

      if(seekers.length===0)return;

      h+='<div style="margin-bottom:16px;background:#fefcf8;border:1px solid #d0c0a0;border-radius:8px;padding:14px">';
      h+='<div style="font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:8px">'+formatDateLong(r.date)+' — '+r.session+'</div>';
      h+='<div style="font-size:12px;color:#7a6a50;margin-bottom:10px">'+seekers.length+' player'+(seekers.length===1?'':'s')+' seeking a partner</div>';

      seekers.forEach(function(p){
        h+='<div style="padding:8px 0;border-bottom:1px solid #e8e0d0;display:flex;justify-content:space-between;align-items:center">';
        h+='<div>';
        h+='<div style="font-size:13px;font-weight:700;color:#1a1a1a">'+p.displayName+'</div>';
        h+='<div style="font-size:12px;color:#3a3a3a">';
        if(p.skill)h+=p.skill;
        if(p.masterpoints)h+=' — '+p.masterpoints+' MPs';
        var sys=(p.systems&&p.systems.length)?p.systems.join(', '):(p.system||'');
        if(sys&&sys!=='Standard American')h+=' — '+sys;
        h+='</div>';
        h+='</div>';
        h+='<div style="text-align:right;font-size:12px">';
        if(p.phone)h+='<a href="tel:'+p.phone+'" style="color:#b8860b;display:block">&#128222; '+p.phone+'</a>';
        if(p.contactEmail)h+='<a href="mailto:'+p.contactEmail+'" style="color:#b8860b;display:block">&#128231; '+p.contactEmail+'</a>';
        h+='</div>';
        h+='</div>';
      });

      h+='</div>';
    });

    if(results.every(function(r){
      if(r.tables===0)return true;
      var regPairs=r.pairs?Object.values(r.pairs):[];
      var registeredUids={};
      regPairs.forEach(function(pair){registeredUids[pair.player1uid]=true;registeredUids[pair.player2uid]=true;});
      return players.filter(function(p){
        if(registeredUids[p.uid])return false;
        if(!p.venues||!p.venues[club])return false;
        var vdata=p.venues[club];
        if(typeof vdata==='object'&&!Array.isArray(vdata)){
          if(vdata[r.date]){
            var sessArr=vdata[r.date];
            if(Array.isArray(sessArr)){return sessArr.some(function(s){return safeKey(s)===r.sKey;});}
          }
        }
        return false;
      }).length===0;
    })){
      h+='<div style="font-size:13px;color:#aaa;font-style:italic;padding:8px 0">No players currently seeking a partner for these sessions.</div>';
    }
    h+='</div>';
    el.innerHTML=h;
  });
}

function cmSave(){
  var club=window._cmClub;
  var snClub=safeName(club);
  var promises=[];
  Object.keys(window._cmTableData).forEach(function(key){
    var parts=key.split('_');
    // key format: date_sessionKey e.g. 2026-06-10_Open_pairs_at_12-30
    // date is first 10 chars
    var date=key.substring(0,10);
    var sk=key.substring(11);
    var inp=document.getElementById('cm_'+key);
    if(inp){
      var tables=parseInt(inp.value)||0;
      promises.push(dbRef('registrations/'+snClub+'/'+date+'/'+sk+'/tables').set(tables));
    }
  });
  Promise.all(promises).then(function(){
    window._cmDirty=false;
    showToast('Game setup saved!');
  }).catch(function(e){alert('Error saving: '+e.message);});
}


function renderGames(){
  var selectedClub=window._gamesClub||'';
  var h='<div class="page"><div class="page-title">&#127183; Games</div>';
  h+='<div class="page-sub">Club pre-registration</div>';

  // Load all registration data first, then build the page
  var today=new Date();today.setHours(0,0,0,0);
  
  // Build sessions for all clubs
  var allSessions={};
  CLUBS.forEach(function(club){
    var sched=CLUB_SCHEDULES[club]||{};
    var sessions=[];
    for(var d=0;d<28;d++){
      var dt=new Date(today);
      dt.setDate(today.getDate()+d);
      var dow=dt.getDay();
      var daySessions=sched[dow]||[];
      if(daySessions.length>0){
        var mm=dt.getMonth()+1;
        var dd=dt.getDate();
        var dateStr=dt.getFullYear()+'-'+(mm<10?'0'+mm:mm)+'-'+(dd<10?'0'+dd:dd);
        daySessions.forEach(function(sess){
          sessions.push({date:dateStr,session:sess,dateObj:new Date(dt)});
        });
      }
    }
    if(sessions.length)allSessions[club]=sessions;
  });

  // Check which clubs have at least one session with tables configured
  var regPath='registrations';
  dbRef(regPath).once('value').then(function(snap){
    var regData=snap.exists()?snap.val():{};
    
    // My Registrations section
    var myRegs=[];
    CLUBS.forEach(function(club){
      var snClub=safeName(club);
      var clubReg=regData[snClub]||{};
      var sessions=allSessions[club]||[];
      sessions.forEach(function(s){
        var sKey=safeKey(s.session);
        var dateReg=clubReg[s.date]||{};
        var sessReg=dateReg[sKey]||{};
        var pairs=sessReg.pairs||{};
        Object.entries(pairs).forEach(function(e){
          var pairId=e[0],pair=e[1];
          if(pair.player1uid===me.uid||pair.player2uid===me.uid){
            myRegs.push({club:club,date:s.date,session:s.session,sk:sKey,pairId:pairId,pair:pair,tables:sessReg.tables||0});
          }
        });
      });
    });

    if(myRegs.length>0){
      h+='<div class="form-box" style="margin-bottom:16px">';
      h+='<div style="font-family:Playfair Display,serif;font-size:15px;font-weight:700;color:var(--td);margin-bottom:12px">&#10003; Your Upcoming Registrations</div>';
      myRegs.forEach(function(r){
        var myName=r.pair.player1uid===me.uid?r.pair.player1name:r.pair.player2name;
        var mySeat=r.pair.player1uid===me.uid?r.pair.player1seat:r.pair.player2seat;
        var partnerName=r.pair.player1uid===me.uid?r.pair.player2name:r.pair.player1name;
        var partnerUid=r.pair.player1uid===me.uid?r.pair.player2uid:r.pair.player1uid;
        var partnerObj=players.find(function(p){return p.uid===partnerUid;})||{};
        var partnerEmail=partnerObj.contactEmail||'';

        h+='<div style="font-size:14px;font-weight:700;color:var(--td)">'+r.club+'</div>';
        h+='<div style="font-size:13px;color:var(--tm);margin-top:2px">'+formatDateLong(r.date)+' &nbsp;·&nbsp; '+r.session+'</div>';
        h+='<div style="font-size:13px;color:var(--tm);margin-top:2px">Table '+r.pair.table+' &nbsp;·&nbsp; '+r.pair.direction+' &nbsp;·&nbsp; Partner: <strong>'+partnerName+'</strong></div>';
        h+='<button class="btn btn-red" style="margin-top:6px;padding:4px 12px;font-size:12px" ';
        h+='data-club="'+r.club+'" data-date="'+r.date+'" data-sk="'+r.sk+'" data-pairid="'+r.pairId+'" ';
        h+='data-partneruid="'+partnerUid+'" data-partnername="'+partnerName+'" data-partneremail="'+partnerEmail+'" ';
        h+='onclick="cancelRegistration(this)">Cancel</button>';
        h+='</div>';
      });
      h+='</div>';
    }

    // Find clubs with table limits
    var clubsWithReg=CLUBS.filter(function(club){
      var snClub=safeName(club);
      var clubReg=regData[snClub]||{};
      var sessions=allSessions[club]||[];
      return sessions.some(function(s){
        var sKey=safeKey(s.session);
        var dateReg=clubReg[s.date]||{};
        var sessReg=dateReg[sKey]||{};
        return sessReg.tables>0;
      });
    });

    if(clubsWithReg.length===0){
      h+='<div class="form-box" style="text-align:center;color:var(--tl);font-style:italic;padding:32px">No club games are currently open for registration.</div>';
      h+='</div>';
      setHTML("content",h);
      return;
    }

    // If selected club no longer has registration, reset
    if(selectedClub&&clubsWithReg.indexOf(selectedClub)<0)selectedClub='';
    if(clubsWithReg.length===1)selectedClub=clubsWithReg[0];
    window._gamesClub=selectedClub;

    // Club selector - only clubs with registration
    if(clubsWithReg.length>1){
      h+='<div style="margin-bottom:16px">';

      h+='<option value="">-- Choose a club --</option>';

      h+='</div>';
      setHTML("content",h);
      return;
    }

    // Show sessions for selected club that have table limits
    var snClub=safeName(selectedClub);
    var clubReg=regData[snClub]||{};
    var sessions=(allSessions[selectedClub]||[]).filter(function(s){
      var sKey=safeKey(s.session);
      var dateReg=clubReg[s.date]||{};
      var sessReg=dateReg[sKey]||{};
      return sessReg.tables>0;
    });

  if(sessions.length===0){
    h+='<div class="form-box" style="text-align:center;color:var(--tl);font-style:italic;padding:32px">No upcoming sessions found for '+selectedClub+'.</div>';
  } else {
    h+='<div class="form-box" style="margin-bottom:16px">';
    h+='<div style="font-family:Playfair Display,serif;font-size:16px;font-weight:700;color:var(--td);margin-bottom:12px">&#127968; '+selectedClub+'</div>';

    sessions.forEach(function(s){
      var sKey=safeKey(s.session);
      var snClub=safeName(selectedClub);
      var dateReg=clubReg[s.date]||{};
      var sessReg=dateReg[sKey]||{};
      var tables=sessReg.tables||0;
      var pairs=sessReg.pairs?Object.keys(sessReg.pairs).length:0;
      var waitlist=sessReg.waitlist?Object.keys(sessReg.waitlist).length:0;
      var maxPairs=tables*2;

      } else {

        statusHtml='<span style="color:'+color+'">Open seats available for '+avail+' pair'+(avail===1?'':'s')+'</span>';
      }

      h+='<div style="padding:12px 0;border-bottom:1px solid var(--cream-dark)">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';

      h+='<div style="font-size:14px;font-weight:700;color:var(--td)">'+formatDateLong(s.date)+'</div>';
      h+='<div style="font-size:13px;color:var(--tm);margin-top:2px">'+s.session+'</div>';
      h+='</div>';
      h+='<div style="text-align:right">';
      h+=statusHtml;
      var btnDisabled=avail<=0?'disabled':'';
      var btnData='data-club="'+selectedClub+'" data-date="'+s.date+'" data-sk="'+sKey+'" data-tables="'+tables+'"';
      h+='<br><button class="btn btn-gold" style="margin-top:6px;padding:6px 14px;font-size:12px" '+btnDisabled+' '+btnData+' onclick="showRegistrationForm(this)">Register</button>';

      h+='</div>';
    });
    h+='</div>';
    setHTML('content',h);
  }

    h+='</div>';
  }).catch(function(){
    setHTML("content",'<div class="page"><div class="page-title">&#127183; Games</div><div class="form-box" style="text-align:center;color:var(--tl);font-style:italic;padding:32px">Unable to load registration data. Please try again.</div></div>');
  });

function showRegistrationForm(btn){
  var club=btn.getAttribute('data-club');
  var date=btn.getAttribute('data-date');
  var sk=btn.getAttribute('data-sk');
  var tables=parseInt(btn.getAttribute('data-tables'))||0;

  // Reset state
  window._regTable=null;window._regSeat=null;window._regSeatPair=null;
  window._regPartnerUid=null;window._regPartnerName=null;

  // Load current registrations to show available seats
  dbRef('registrations/'+safeName(club)+'/'+date+'/'+sk).once('value').then(function(snap){
    var regData=snap.exists()?snap.val():{};
    var pairs=regData.pairs||{};

    // Check if current player is already registered
    var myReg=null;
    var myPairId=null;
    Object.entries(pairs).forEach(function(e){
      var pid=e[0],pair=e[1];
      if(pair.player1uid===me.uid||pair.player2uid===me.uid){
        myReg=pair;myPairId=pid;
      }
    });

    // If already registered show current registration with cancel option
    if(myReg){
      var h='<div class="page"><div class="page-title">Your Registration</div>';
      h+='<div style="font-size:13px;color:var(--tm);margin-bottom:4px">'+club+'</div>';

      h+='<div class="form-box" style="margin-bottom:16px">';
      h+='<div style="font-size:14px;font-weight:700;color:var(--td);margin-bottom:12px">&#10003; You are registered!</div>';
      h+='<div style="font-size:13px;color:var(--tm);line-height:1.8">';
      h+='<div>&#9824; <strong>'+(myReg.player1uid===me.uid?myReg.player1name:myReg.player2name)+'</strong> (you) — '+(myReg.player1uid===me.uid?myReg.player1seat:myReg.player2seat)+' seat</div>';
      h+='<div>&#9824; <strong>'+(myReg.player1uid===me.uid?myReg.player2name:myReg.player1name)+'</strong> (partner) — '+(myReg.player1uid===me.uid?myReg.player2seat:myReg.player1seat)+' seat</div>';
      h+='<div>&#127968; Table '+myReg.table+' &nbsp;|&nbsp; Direction: <strong>'+myReg.direction+'</strong></div>';
      h+='</div></div>';
      h+='<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#7a5a00;line-height:1.6">';

      var myPartnerUid=myReg.player1uid===me.uid?myReg.player2uid:myReg.player1uid;
      var myPartnerName=myReg.player1uid===me.uid?myReg.player2name:myReg.player1name;
      var myPartner=players.find(function(p){return p.uid===myPartnerUid;});
      var myPartnerEmail=myPartner&&myPartner.contactEmail?myPartner.contactEmail:'';
      h+='<button class="btn btn-red" data-club="'+club+'" data-date="'+date+'" data-sk="'+sk+'" data-pairid="'+myPairId+'" data-partneruid="'+myPartnerUid+'" data-partnername="'+myPartnerName+'" data-partneremail="'+myPartnerEmail+'" onclick="cancelRegistration(this)" style="margin-right:8px">Cancel Registration</button>';
      h+='<button class="btn" onclick="renderGames()">Back</button>';
      h+='</div>';
      setHTML('content',h);

      };
      var seatColors={N:'#2980b9',S:'#2980b9',E:'#27ae60',W:'#27ae60'};

      seats.forEach(function(seat){

    h+='</div>';

    // Confirm button
    h+='<div id="reg-summary" style="display:none;background:rgba(10,24,18,0.7);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px"><div style="font-weight:700;color:var(--gold-dim);margin-bottom:8px">Registration Summary</div><div id="reg-summary-content" style="color:var(--tm);line-height:1.8"></div></div>';
    h+='<button class="btn btn-gold" id="reg-confirm-btn" data-club="'+club+'" data-date="'+date+'" data-sk="'+sk+'" onclick="confirmRegEl(this)">Confirm Registration</button>';
    h+='<button class="btn" style="margin-left:8px" onclick="renderGames()">Cancel</button>';
    h+='</div>';

    setHTML('content',h);
    window._regTable=null;
    window._regSeat=null;
    window._regPartnerUid=null;
    window._regPartnerName=null;
  });

function filterRegPartners(val){
  var items=document.querySelectorAll('.reg-partner-item');
  items.forEach(function(item){
    item.style.display=val===''||item.textContent.toLowerCase().indexOf(val.toLowerCase())>=0?'':'none';
  });

function selectRegPartner(el){

function selectSeat(el){

  document.querySelectorAll('[data-seat]').forEach(function(s){

    s.style.border='2px solid var(--gold)';

  var seat=el.getAttribute('data-seat');

  window._regTable=table;

  document.querySelectorAll('[data-seat][data-table="'+table+'"]').forEach(function(s){

function cancelRegistration(btn){
  if(!confirm('Are you sure you want to cancel your registration?'))return;
  var club=btn.getAttribute('data-club');
  var date=btn.getAttribute('data-date');
  var sk=btn.getAttribute('data-sk');
  var pairId=btn.getAttribute('data-pairid');

  // Read pair data synchronously from already-loaded registration data
  // We need partner info NOW before any async calls so email opens immediately
  var partnerUid=btn.getAttribute('data-partneruid');
  var partnerName=btn.getAttribute('data-partnername');
  var partnerEmail=btn.getAttribute('data-partneremail');

  var msgText=me.displayName+' has cancelled your registration for the game at '+club+
    ' on '+formatDateLong(date)+' ('+sk.replace(/_/g,' ')+').'+
    ' You no longer have a reserved spot for this game.';

  // Open email immediately while still in user gesture context
  if(partnerEmail){
    var mailLink='mailto:'+partnerEmail+
      '?subject=Bridge Game Registration Cancelled — '+club+' '+formatDateLong(date)+
      '&body='+encodeURIComponent(msgText);
    window.open(mailLink);
  }

  // Now do async Firebase operations
  dbRef('registrations/'+safeName(club)+'/'+date+'/'+sk+'/pairs/'+pairId).remove().then(function(){
    if(partnerUid)sendMessage(partnerUid,msgText,null);
    showToast('Registration cancelled. Your partner has been notified.');
    renderGames();
  }).catch(function(e){alert('Error: '+e.message);});
}

function confirmRegistration(club,date,sk){
  if(!window._regPartnerUid&&!window._regTable){alert('Please select a partner and a seat to continue.');return;}
  if(!window._regPartnerUid){alert('Please select a partner to continue.');return;}
  if(!window._regTable||!window._regSeat){showToast('Please select a table and seat to continue.');return;}
  var pair={N:'S',S:'N',E:'W',W:'E'};
  var pairData={
    player1uid:me.uid,
    player1name:me.displayName,
    player1seat:window._regSeat,
    player2uid:window._regPartnerUid,
    player2name:window._regPartnerName,
    player2seat:pair[window._regSeat],
    table:parseInt(window._regTable),
    direction:(window._regSeat==='N'||window._regSeat==='S')?'N/S':'E/W',
    seat1:window._regSeat,
    seat2:pair[window._regSeat],
    confirmedBy1:true,
    confirmedBy2:false,
    ts:Date.now()
  };
  var pairId=me.uid+'_'+window._regPartnerUid;
  dbRef('registrations/'+safeName(club)+'/'+date+'/'+sk+'/pairs/'+pairId).set(pairData).then(function(){
    // Notify partner via in-app message
    var msgText='You have been registered for a game at '+club+' on '+formatDateLong(date)+
      ' ('+sk.replace(/_/g,' ')+') by '+me.displayName+
      '. You will be sitting '+pairData.direction+' at Table '+pairData.table+
      '. Please confirm you can attend or cancel if you cannot make it.';
    // Email if partner has one, otherwise in-app message
    var partner=players.find(function(p){return p.uid===window._regPartnerUid;});
    if(partner&&partner.contactEmail){
      var mailLink='mailto:'+partner.contactEmail+
        '?subject=Bridge Game Registration — '+club+' '+formatDateLong(date)+
        '&body='+encodeURIComponent(msgText);
      window.open(mailLink);
    } else {
      sendMessage(window._regPartnerUid,msgText,null);
    }

    showToast('Registration confirmed! Your partner has been notified.');
    renderGames();
  }).catch(function(e){alert('Registration failed: '+e.message);});
}

function formatDateLong(ds){
  var p=ds.split('-');
  var dt=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return days[dt.getDay()]+', '+months[dt.getMonth()]+' '+dt.getDate();
}

function safeName(s){return s?s.replace(/[^a-zA-Z0-9]/g,'_'):'';}

function printQR(){
  var qr=document.getElementById("qr-code");
  if(!qr)return;
  // Try canvas first, then img
  var canvas=qr.querySelector("canvas");
  var img=qr.querySelector("img");
  var dataUrl=canvas?canvas.toDataURL("image/png"):(img?img.src:null);
  if(!dataUrl){alert("QR code not ready. Please wait a moment and try again.");return;}
  var appUrl=window.location.origin+window.location.pathname;
  var w=window.open("","_blank");
  w.document.write('<html><head><style>body{text-align:center;padding:40px;font-family:Georgia,serif}h2{color:#1a1208}p{color:#4a3f28}@media print{button{display:none}}</style></head><body>');
  w.document.write('<h2>Bridge Partnership Desk</h2>');
  w.document.write('<p style="margin-bottom:20px">Scan to find a bridge partner</p>');
  w.document.write('<img src="'+dataUrl+'" style="width:300px;height:300px"/>');
  w.document.write('<p style="color:#8a7a5a;margin-top:20px;font-size:14px">'+appUrl+'</p>');
  w.document.write('<br><button onclick="window.print()" style="padding:10px 24px;font-size:15px;cursor:pointer;font-family:Georgia,serif">Print</button>');
  w.document.write('</body></html>');
  w.document.close();
}

function cleanupVenueFromPlayers(venueName){
  // Remove a venue from all player profiles that have it
  var affected=players.filter(function(p){return p.venues&&p.venues[venueName]!==undefined;});
  if(!affected.length)return Promise.resolve();
  var promises=affected.map(function(p){
    var newVenues=Object.assign({},p.venues);
    delete newVenues[venueName];
    var newPrefs=Object.assign({},p.teamPrefs||{});
    delete newPrefs[venueName];
    return dbRef("players/"+p.uid).update({venues:newVenues,teamPrefs:newPrefs});
  });
  return Promise.all(promises);
}

function cleanupOldClubDates(){
  if(!confirm("Delete old club date selections from all player profiles? Players will need to re-select their dates and sessions."))return;
  var updates=[];
  players.forEach(function(p){
    if(!p.venues)return;
    var newVenues=Object.assign({},p.venues);
    var changed=false;
    Object.keys(newVenues).forEach(function(v){
      if(TOURNAMENTS.hasOwnProperty(v))return;
      var vdata=newVenues[v];
      if(Array.isArray(vdata)&&vdata.length>0){
        // Old format - delete it
        delete newVenues[v];
        changed=true;
      }
    });
    if(changed)updates.push({uid:p.uid,venues:newVenues});
  });
  if(!updates.length){
    setHTML("cleanup-dates-banner",'<div class="banner ok">No cleanup needed.</div>');
    return;
  }
  var promises=updates.map(function(u){
    return dbRef("players/"+u.uid+"/venues").set(u.venues);
  });
  Promise.all(promises).then(function(){return loadPlayers();}).then(function(){
    setHTML("cleanup-dates-banner",'<div class="banner ok">Cleared old club dates from '+updates.length+' player profile(s). Players will need to re-select their dates.</div>');

function cleanupSystems(){
  if(!confirm("Remove Standard American from all player profiles that have other systems selected?"))return;
  var updates=[];
  players.forEach(function(p){
    if(!p.systems||!p.systems.length)return;
    var sys=Array.isArray(p.systems)?p.systems:Object.values(p.systems);
    var filtered=sys.filter(function(s){return s!=="Standard American";});
    if(filtered.length<sys.length){
      // Had Standard American, now removed
      updates.push({uid:p.uid,systems:filtered,system:filtered[0]||""});
    }
  });
  if(!updates.length){
    setHTML("cleanup-banner",'<div class="banner ok">No cleanup needed — no Standard American found.</div>');
    return;
  }
  var promises=updates.map(function(u){
    return dbRef("players/"+u.uid).update({systems:u.systems,system:u.system});
  });
  Promise.all(promises).then(function(){
    return loadPlayers();
  }).then(function(){
    setHTML("cleanup-banner",'<div class="banner ok">Cleaned up '+updates.length+' player profile(s).</div>');
    setTimeout(function(){setHTML("cleanup-banner","");},4000);
  }).catch(function(e){
    setHTML("cleanup-banner",'<div class="banner err">Error: '+e.message+'</div>');
  });
}

  if(affected.length){
    msg+="\n\n"+affected.length+" player(s) have this tournament in their profile:\n";
    msg+=affected.map(function(p){return "  - "+p.displayName;}).join("\n");
    msg+="\n\nTheir profiles will be updated automatically.";

  if(!confirm(msg))return;
  delete TOURNAMENTS[t];
  dbRef("venueData/tData/"+safeName(t)).remove().then(function(){

  }).then(function(){return loadVenueData();}).then(function(){

function adminSaveClubRename(btn){
  var i=parseInt(btn.getAttribute('data-i'));
  var inp=document.getElementById('club-rename-inp-'+i);
  var newName=inp?inp.value.trim():'';
  if(!newName){alert("Please enter a name.");return;}
  var oldName=CLUBS[i];
  if(newName===oldName){document.getElementById('club-rename-'+i).style.display='none';return;}
  if(CLUBS.indexOf(newName)>=0){alert("A club with that name already exists.");return;}
  CLUBS[i]=newName;
  // Update club schedules
  if(CLUB_SCHEDULES[oldName]){
    CLUB_SCHEDULES[newName]=CLUB_SCHEDULES[oldName];
    delete CLUB_SCHEDULES[oldName];
  }
  var promises=[
    dbRef("venueData/clubs").set(CLUBS),
    dbRef("venueData/clubSchedules/"+oldName).remove()
  ];
  if(CLUB_SCHEDULES[newName]){
    promises.push(dbRef("venueData/clubSchedules/"+newName).set(CLUB_SCHEDULES[newName]));
  }
  // Update all player profiles
  Promise.all(promises).then(function(){
    return renameVenueInPlayers(oldName,newName);
  }).then(function(){return loadPlayers();}).then(function(){return loadVenueData();}).then(function(){renderAdmin();});
}

  var newName=inp?inp.value.trim():'';
  if(!newName){alert("Please enter a name.");return;}
  if(newName===oldName){document.getElementById('tourn-rename-'+tE).style.display='none';return;}
  if(TOURNAMENTS[newName]){alert("A tournament with that name already exists.");return;}
  // Rename in memory
  TOURNAMENTS[newName]=TOURNAMENTS[oldName];
  delete TOURNAMENTS[oldName];
  // Save to Firebase - copy old data to new key, delete old
  var oldData={name:newName,dates:{}};
  var dates=TOURNAMENTS[newName]||{};
  Object.keys(dates).forEach(function(ds){
    var sessions=dates[ds]||[];
    var sessObj={count:sessions.length};
    sessions.forEach(function(s,i){sessObj["s"+i]=s;});
    oldData.dates[ds.replace(/-/g,"_")]=sessObj;
  });
  dbRef("venueData/tData/"+safeName(newName)).set(oldData).then(function(){
    return dbRef("venueData/tData/"+safeName(oldName)).remove();
  }).then(function(){
    return saveAllTournNames();
  }).then(function(){
    return renameVenueInPlayers(oldName,newName);
  }).then(function(){return loadPlayers();}).then(function(){return loadVenueData();}).then(function(){renderAdmin();});
}

function renameVenueInPlayers(oldName,newName){
  var affected=players.filter(function(p){return p.venues&&p.venues[oldName]!==undefined;});
  if(!affected.length)return Promise.resolve();
  var promises=affected.map(function(p){
    var newVenues=Object.assign({},p.venues);
    newVenues[newName]=newVenues[oldName];
    delete newVenues[oldName];
    var newPrefs=Object.assign({},p.teamPrefs||{});
    if(newPrefs[oldName]){newPrefs[newName]=newPrefs[oldName];delete newPrefs[oldName];}
    return dbRef("players/"+p.uid).update({venues:newVenues,teamPrefs:newPrefs});
  });
  return Promise.all(promises);
}

function adminManageClubs(uid,name){

  var h='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center">';
  h+='<div style="background:var(--card);border-radius:12px;padding:24px;max-width:340px;width:90%">';
  h+='<div style="font-size:16px;font-weight:700;color:var(--td);margin-bottom:4px">Manage Clubs</div>';
  h+='<div style="font-size:13px;color:var(--tm);margin-bottom:16px">'+name+'</div>';
  CLUBS.forEach(function(club){
    var checked=current.indexOf(club)>=0?'checked':'';
    h+='<label style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--td);padding:8px 0;border-bottom:1px solid var(--cream-dark);cursor:pointer">';
    h+='<input type="checkbox" id="mc_'+safeName(club)+'" value="'+club+'" '+checked+' style="width:18px;height:18px"/>';
    h+=club;
    h+='</label>';
  });
  h+='<div style="display:flex;gap:8px;margin-top:16px">';
  h+='<button class="btn btn-gold" style="margin-top:0;flex:1" data-uid="'+uid+'" data-name="'+name+'" onclick="saveManageClubsEl(this)">Save</button>';
  h+='<button class="btn" style="margin-top:0" onclick="closeManageClubs()">Cancel</button>';
  h+='</div>';
  h+='</div></div>';
  var overlay=document.createElement('div');
  overlay.id='mc-overlay';
  overlay.innerHTML=h;
  document.body.appendChild(overlay);
}

function closeManageClubs(){var o=document.getElementById('mc-overlay');if(o)o.remove();}
function saveManageClubsEl(btn){saveManageClubs(btn.getAttribute('data-uid'),btn.getAttribute('data-name'));}
function saveManageClubs(uid,name){
  var clubs=[];
  CLUBS.forEach(function(club){
    var cb=document.getElementById('mc_'+safeName(club));
    if(cb&&cb.checked)clubs.push(club);
  });
  dbRef('players/'+uid+'/manages').set(clubs.length?clubs:null).then(function(){
    document.getElementById('mc-overlay').remove();
    return loadPlayers();
  }).then(function(){
    renderAdmin();
    showToast('Club assignments updated for '+name);
  }).catch(function(e){alert('Error: '+e.message);});
}

window.onload=function(){
  document.body.innerHTML='<div class="loading"><div id="load-msg">Loading...</div></div>';
  // Timeout - if still loading after 10 seconds, show error
  setTimeout(function(){
    var msg=document.getElementById("load-msg");
    if(msg){msg.innerHTML="Still loading...";var btn=document.createElement("button");btn.textContent="Refresh";btn.onclick=function(){location.reload();};btn.style.cssText="margin-top:16px;padding:8px 20px;background:var(--gold-dim);color:var(--gold-light);border:1px solid var(--gold);border-radius:4px;cursor:pointer;font-family:Georgia,serif;display:block";msg.appendChild(btn);}
  },10000);
  auth.onAuthStateChanged(function(user){
    if(user){
      // Only handle if not already logged in
      if(!me&&!_registering){handleUser(user);}
    } else if(false){ // placeholder to keep catch block
      loadPlayers().catch(function(e){
        document.body.innerHTML='<div class="loading"><div>Could not load: '+e.message+'<br><br><button onclick="location.reload()" style="padding:8px 20px;background:var(--gold-dim);color:var(--gold-light);border:1px solid var(--gold);border-radius:4px;cursor:pointer;font-family:Georgia,serif">Try Again</button></div></div>';
      });
    } else {renderLogin();}
  });
};
